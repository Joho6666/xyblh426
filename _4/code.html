<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be+Vietnam+Pro:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-surface": "#2c3338",
              "secondary-container": "#d8e3f8",

              "surface-variant": "#dce3e9",

              "inverse-surface": "#0b0f11",

              "on-background": "#2c3338",
              "surface-tint": "#426089",
              "secondary": "#556071",
              "primary-fixed": "#afcefd",
              "on-tertiary-fixed": "#382e55",
              "surface-dim": "#d4dbe1",
              "tertiary-fixed": "#d8cafc",
              "primary-dim": "#35547d",
              "surface-container-highest": "#dce3e9",
              "secondary-dim": "#495465",
              "inverse-primary": "#afcefd",
              "secondary-fixed-dim": "#cad5ea",
              "secondary-fixed": "#d8e3f8",
              "on-tertiary-container": "#4b416a",
              "surface": "#f7f9fc",
              "error": "#a83836",
              "primary-container": "#afcefd",
              "on-secondary-fixed-variant": "#515c6e",
              "on-tertiary-fixed-variant": "#554a74",
              "on-secondary-container": "#475263",
              "error-container": "#fa746f",
              "on-primary": "#f8f8ff",
              "outline": "#747c81",
              "inverse-on-surface": "#9a9da0",
              "tertiary": "#635983",
              "on-secondary-fixed": "#354050",
              "error-dim": "#67040d",
              "primary-fixed-dim": "#a1c0ee",
              "outline-variant": "#abb3b9"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Be Vietnam Pro"],
              "label": ["Be Vietnam Pro"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background-color: #f7f9fc;
            color: #2c3338;
        }
        .editorial-shadow {
            box-shadow: 0 12px 32px rgba(44, 51, 56, 0.06);
        }
        .glass-nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background min-h-screen pb-32">
<!-- TopAppBar -->
<header class="bg-[#f7f9fc]/80 backdrop-blur-xl fixed top-0 w-full z-50 flex items-center justify-between px-6 h-16 w-full">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#426089] cursor-pointer hover:bg-[#f0f4f8]/50 p-2 rounded-full transition-colors" data-icon="menu">menu</span>
</div>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold text-lg tracking-tight text-[#426089]">校园墙</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<main class="pt-24 px-6 max-w-2xl mx-auto space-y-8">
<!-- User Profile Header -->
<section class="flex flex-col items-center text-center space-y-4">
<div class="relative group">
<div class="absolute -inset-1 bg-gradient-to-tr from-primary to-tertiary-fixed opacity-20 rounded-full blur-md group-hover:opacity-40 transition-opacity"></div>
<div class="relative w-28 h-28 rounded-full border-4 border-surface-container-lowest editorial-shadow overflow-hidden">
<img alt="User Avatar" class="w-full h-full object-cover" data-alt="portrait of a young smiling man in casual campus attire against a soft blurred university campus background, warm natural lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAR0NT1-wu-I9ezHRPO3XuUcEZyZ3O1Z8r09jUUV2Mz7dCidWOTqtW8aM8NzstXmRvOSUK1wMmnN7b7VFmphW3rWO8JXIFQt0fyqZG9AgTKHM7j8Em7qIXfjNOT1MSPH1i7OdcaIZY6IO3c1LLtJ2_bXq1KeoYVihRRPb6w4pctjf1c1BsY7fvSM1WE3RqvcRG-KIksqKzRxY82cGSx6mOxnsyBsD4j6GhMMtimy4fst6baS0Tvv4xhNyZ0Es1xNAKoGyK_qaz3kR4w"/>
</div>
</div>
<div class="space-y-1">
<h2 class="font-headline font-extrabold text-2xl tracking-tight text-on-surface">林深见鹿</h2>
<div class="flex items-center justify-center gap-2">
<span class="bg-secondary-container text-on-secondary-container text-[10px] font-bold px-3 py-1 rounded-full tracking-wider flex items-center gap-1">
<span class="material-symbols-outlined text-[12px]" data-icon="verified" style="font-variation-settings: 'FILL' 1;">verified</span>
                        已登录 (微信授权)
                    </span>
</div>
</div>
</section>
<!-- Stats Cards - Bento Style -->
<section class="grid grid-cols-3 gap-3">
<div class="bg-surface-container-lowest p-5 rounded-3xl editorial-shadow flex flex-col items-center justify-center text-center space-y-1">
<span class="font-headline font-bold text-xl text-primary">24</span>
<span class="text-[11px] font-medium text-on-surface-variant uppercase tracking-widest">我的发布</span>
</div>
<div class="bg-surface-container-lowest p-5 rounded-3xl editorial-shadow flex flex-col items-center justify-center text-center space-y-1">
<span class="font-headline font-bold text-xl text-primary">128</span>
<span class="text-[11px] font-medium text-on-surface-variant uppercase tracking-widest">获赞</span>
</div>
<div class="bg-surface-container-lowest p-5 rounded-3xl editorial-shadow flex flex-col items-center justify-center text-center space-y-1">
<span class="font-headline font-bold text-xl text-primary">0</span>
<span class="text-[11px] font-medium text-on-surface-variant uppercase tracking-widest">我的举报</span>
</div>
</section>
<!-- Interactive Menu List -->
<section class="bg-surface-container-low/50 rounded-[2rem] p-2 space-y-1">
<!-- Item 1 -->
<a class="flex items-center justify-between p-4 bg-surface-container-lowest rounded-2xl hover:bg-surface-container transition-colors group" href="#">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-xl bg-primary/10 flex items-center justify-center text-primary group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined" data-icon="edit_square">edit_square</span>
</div>
<span class="font-medium text-on-surface">我的发布</span>
</div>
<span class="material-symbols-outlined text-outline-variant" data-icon="chevron_right">chevron_right</span>
</a>
<!-- Item 2 -->
<a class="flex items-center justify-between p-4 bg-surface-container-lowest rounded-2xl hover:bg-surface-container transition-colors group" href="#">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-xl bg-error/10 flex items-center justify-center text-error group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined" data-icon="report">report</span>
</div>
<span class="font-medium text-on-surface">我的举报</span>
</div>
<span class="material-symbols-outlined text-outline-variant" data-icon="chevron_right">chevron_right</span>
</a>
<!-- Item 3 -->
<a class="flex items-center justify-between p-4 bg-surface-container-lowest rounded-2xl hover:bg-surface-container transition-colors group" href="#">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-xl bg-tertiary/10 flex items-center justify-center text-tertiary group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined" data-icon="category">category</span>
</div>
<span class="font-medium text-on-surface">我的分类</span>
</div>
<span class="material-symbols-outlined text-outline-variant" data-icon="chevron_right">chevron_right</span>
</a>
<!-- Item 4 -->
<a class="flex items-center justify-between p-4 bg-surface-container-lowest rounded-2xl hover:bg-surface-container transition-colors group" href="#">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-xl bg-secondary/10 flex items-center justify-center text-secondary group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined" data-icon="support_agent">support_agent</span>
</div>
<span class="font-medium text-on-surface">联系客服</span>
</div>
<span class="material-symbols-outlined text-outline-variant" data-icon="chevron_right">chevron_right</span>
</a>
<!-- Logout Item -->
<a class="flex items-center justify-between p-4 bg-surface-container-lowest rounded-2xl hover:bg-error/5 transition-colors group" href="#">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-xl bg-outline-variant/10 flex items-center justify-center text-outline group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined" data-icon="logout">logout</span>
</div>
<span class="font-medium text-on-surface">退出登录</span>
</div>
<span class="material-symbols-outlined text-outline-variant" data-icon="chevron_right">chevron_right</span>
</a>
</section>
<!-- Footer Branding -->
<footer class="pt-8 pb-12 text-center space-y-2 opacity-40">
<p class="font-headline font-extrabold text-[10px] tracking-[0.3em] uppercase text-on-surface">The Digital Commons</p>
<p class="font-label text-[10px] text-on-surface-variant">Version 2.4.0 • Built for Campus Spirit</p>
</footer>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 w-full h-20 flex justify-around items-center px-8 pb-safe glass-nav rounded-t-[24px] z-50 shadow-[0_-12px_32px_rgba(44,51,56,0.06)]">
<!-- Home Tab -->
<a class="flex flex-col items-center justify-center text-[#abb3b9] hover:text-[#426089] transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-label text-[10px] font-medium mt-1">首页</span>
</a>
<!-- Create Tab (Center, prominent) -->
<a class="scale-125 -translate-y-4 bg-[#426089] text-white rounded-full p-4 shadow-lg active:scale-95 transition-all duration-300 flex items-center justify-center" href="#">
<span class="material-symbols-outlined text-2xl" data-icon="add">add</span>
</a>
<!-- Profile Tab (Active) -->
<a class="flex flex-col items-center justify-center text-[#426089] font-bold transition-all duration-300" href="#">
<span class="material-symbols-outlined" data-icon="person" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-label text-[10px] font-medium mt-1">我的</span>
</a>
</nav>
</body></html>
